name: Argos upload
permissions:
  contents: read
  pull-requests: read
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  argos:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        run: corepack enable
      - uses: actions/setup-node@v6
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Add relevant action here
