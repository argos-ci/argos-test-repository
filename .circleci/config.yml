# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define a job to be invoked later in a workflow.
# See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#jobs-overview & https://circleci.com/docs/reference/configuration-reference/#jobs
jobs:
  test-shard:
    # Specify the execution environment. You can specify an image from Docker Hub or use one of our convenience images from CircleCI's Developer Hub.
    # See: https://circleci.com/docs/guides/execution-managed/executor-intro/ & https://circleci.com/docs/reference/configuration-reference/#executor-job
    docker:
      # Specify the version you desire here
      # See: https://circleci.com/developer/images/image/cimg/base
      - image: cimg/base:current

    # Run this job across 4 parallel containers, like Playwright shard mode.
    # CircleCI exposes CIRCLE_NODE_TOTAL (4) and CIRCLE_NODE_INDEX (0-3) to each container.
    # See: https://circleci.com/docs/guides/optimize/parallelism-faster-jobs/
    parallelism: 4

    # Add steps to the job
    # See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#steps-overview & https://circleci.com/docs/reference/configuration-reference/#steps
    steps:
      # Checkout the code as the first step.
      - checkout
      - run:
          name: "Debug: show workflow id"
          command: echo "CIRCLE_WORKFLOW_ID=$CIRCLE_WORKFLOW_ID"
      - run:
          name: "Say hello from shard"
          # CIRCLE_NODE_INDEX is 0-based; show a friendly 1-based shard number.
          command: echo "Hello from shard $((CIRCLE_NODE_INDEX + 1))/$CIRCLE_NODE_TOTAL"
      - run:
          name: "Simulate Playwright shard"
          # This mimics: npx playwright test --shard=$((CIRCLE_NODE_INDEX + 1))/$CIRCLE_NODE_TOTAL
          # Shard 3 (CIRCLE_NODE_INDEX == 2) fails for real on every attempt.
          # CircleCI's native automatic step rerun (max_auto_reruns) will retry it.
          command: |
            SHARD="$((CIRCLE_NODE_INDEX + 1))/$CIRCLE_NODE_TOTAL"
            echo "Running tests for shard $SHARD"
            echo "(simulation) npx playwright test --shard=$SHARD"
            # Simulate some work so the parallel containers are visible in the UI.
            sleep $((RANDOM % 10 + 5))
            if [ "$CIRCLE_NODE_INDEX" -eq 2 ]; then
              echo "Shard $SHARD: a test failed!"
              exit 1
            fi
            echo "Shard $SHARD done"
          # Native CircleCI automatic step rerun: retry this step up to 3 times if it fails.
          # See: https://circleci.com/docs/llms.txt (Automatic reruns)
          max_auto_reruns: 3
          auto_rerun_delay: 10s

# Orchestrate jobs using workflows
# See: https://circleci.com/docs/guides/orchestrate/workflows/ & https://circleci.com/docs/reference/configuration-reference/#workflows
workflows:
  test-workflow: # This is the name of the workflow, feel free to change it to better match your workflow.
    # Native CircleCI automatic workflow rerun: if the workflow still fails after the
    # step-level reruns are exhausted, rerun the failed jobs (only failed jobs are retried).
    max_auto_reruns: 2
    # Inside the workflow, you define the jobs you want to run.
    jobs:
      - test-shard
